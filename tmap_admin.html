<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Административен панел</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="favicon-injector.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
      color: #222;
    }

    h1 {
      color: #1d5c4d;
      margin-bottom: 16px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 15px;
    }

    input[type="text"],
    textarea {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    #searchInput {
      width: 320px;
      max-width: 100%;
      background: white;
    }

    .refresh-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1d5c4d;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .refresh-btn:hover {
      opacity: 0.95;
    }

    .info-box {
      margin-bottom: 15px;
      padding: 12px 14px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #1d5c4d;
      color: white;
    }

    td img {
      border-radius: 6px;
      max-width: 100px;
      max-height: 80px;
      object-fit: cover;
      display: block;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button.action-btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-edit {
      background-color: #ffc107;
      color: black;
    }

    .btn-approve {
      background-color: #28a745;
      color: white;
    }

    .btn-reject {
      background-color: #dc3545;
      color: white;
    }

    .status {
      font-weight: bold;
    }

    .status-neutral { color: #666; }
    .status-success { color: green; }
    .status-error { color: red; }
    .status-warn { color: orange; }
    .status-processing { color: #1d5c4d; }

    .empty-row td,
    .message-row td {
      text-align: center;
      font-weight: bold;
      color: #666;
      padding: 24px 12px;
    }

    #editModal {
      display: none;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 420px;
      max-width: 100%;
    }

    .modal-box h3 {
      margin-top: 0;
      color: #1d5c4d;
    }

    .modal-box label {
      display: block;
      margin-top: 10px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .modal-box input,
    .modal-box textarea {
      width: 100%;
    }

    .coord-row {
      display: flex;
      gap: 10px;
    }

    .coord-row input {
      width: 100%;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .modal-save {
      background: #1d5c4d;
      color: white;
    }

    .modal-cancel {
      background: #ddd;
      color: #222;
    }

    .table-wrap {
      overflow-x: auto;
    }

    @media (max-width: 768px) {
      .coord-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <audio id="notificationSound">
    <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
    Вашият браузър не поддържа аудио.
  </audio>

  <h1>Администраторски панел</h1>

  <div class="top-bar">
    <input
      type="text"
      id="searchInput"
      placeholder="Търси по име или планина"
      oninput="filterRows()"
    />
    <button class="refresh-btn" onclick="loadPendingRequests(true)">Обнови</button>
  </div>

  <div class="info-box" id="infoBox">Зареждане на заявки...</div>

  <div class="table-wrap">
    <table id="requestsTable">
      <thead>
        <tr>
          <th>Заглавие</th>
          <th>Описание</th>
          <th>Координати</th>
          <th>Планина</th>
          <th>Снимка</th>
          <th>Действия</th>
          <th>Статус</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="message-row">
          <td colspan="7">Зареждане...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div id="editModal">
    <div class="modal-box">
      <h3>Редактирай обекта</h3>

      <input type="hidden" id="edit-id">

      <label for="edit-title">Заглавие:</label>
      <input type="text" id="edit-title">

      <label for="edit-description">Описание:</label>
      <textarea id="edit-description" style="height:90px;"></textarea>

      <label for="edit-mountain">Планина / Регион:</label>
      <input type="text" id="edit-mountain">

      <label>Координати:</label>
      <div class="coord-row">
        <input type="text" id="edit-lat" placeholder="Ширина">
        <input type="text" id="edit-lng" placeholder="Дължина">
      </div>

      <label for="edit-img">URL на снимка:</label>
      <input type="text" id="edit-img">

      <div class="modal-actions">
        <button class="action-btn modal-save" onclick="saveEdit()">Запази</button>
        <button class="action-btn modal-cancel" onclick="closeEditModal()">Отказ</button>
      </div>
    </div>
  </div>

  <script>
    const sb = window.supabase.createClient(
      'https://cmiylzpmpwqbacjoqtkx.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtaXlsenBtcHdxYmFjam9xdGt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM5ODcwMDUsImV4cCI6MjA2OTU2MzAwNX0.FY2d1NSGTmw6SydxT_V0cKF7Kp2USbp91VdfO_eqZz8'
    );

    let lastIds = [];

    function escapeHtml(value) {
      if (value === null || value === undefined) return '';
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setInfo(message) {
      document.getElementById('infoBox').textContent = message;
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    function openEditModal() {
      document.getElementById('editModal').style.display = 'flex';
    }

    function filterRows() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll("#tableBody tr[data-row='true']");

      rows.forEach(row => {
        const text = (row.dataset.search || '').toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
      });
    }

    async function loadPendingRequests(showRefreshMessage = false) {
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = `
        <tr class="message-row">
          <td colspan="7">Зареждане...</td>
        </tr>
      `;

      const { data, error } = await sb
        .from("pending_places")
        .select("*")
        .order("created_at", { ascending: false });

      console.log("pending_places data:", data);
      console.log("pending_places error:", error);

      if (error) {
        tbody.innerHTML = `
          <tr class="message-row">
            <td colspan="7" style="color:red;">Грешка при зареждане: ${escapeHtml(error.message)}</td>
          </tr>
        `;
        setInfo("Грешка при зареждане на заявките.");
        return;
      }

      if (!data || data.length === 0) {
        tbody.innerHTML = `
          <tr class="empty-row">
            <td colspan="7">Няма подадени заявки.</td>
          </tr>
        `;
        setInfo("Няма подадени заявки.");
        lastIds = [];
        return;
      }

      tbody.innerHTML = "";

      data.forEach(place => {
        const row = document.createElement("tr");
        row.dataset.row = "true";
        row.dataset.search = [
          place.title || '',
          place.description || '',
          place.mountain || '',
          place.latitude || '',
          place.longitude || ''
        ].join(' ');

        const imageHtml = place.image_url
          ? `<img src="${escapeHtml(place.image_url)}" alt="Снимка" onerror="this.outerHTML='Невалидна снимка'">`
          : `Няма снимка`;

        row.innerHTML = `
          <td>${escapeHtml(place.title || '')}</td>
          <td>${escapeHtml(place.description || '')}</td>
          <td>${escapeHtml(place.latitude ?? '')}, ${escapeHtml(place.longitude ?? '')}</td>
          <td>${escapeHtml(place.mountain || '')}</td>
          <td>${imageHtml}</td>
          <td>
            <div class="actions">
              <button class="action-btn btn-edit" onclick="editPlace(${Number(place.id)})">Редактирай</button>
              <button class="action-btn btn-approve" onclick="approvePlace(${Number(place.id)}, this.closest('tr'))">Одобри</button>
              <button class="action-btn btn-reject" onclick="rejectPlace(${Number(place.id)}, this.closest('tr'))">Отхвърли</button>
            </div>
          </td>
          <td><span class="status status-neutral">—</span></td>
        `;

        tbody.appendChild(row);
      });

      setInfo(`Общо заявки: ${data.length}`);
      lastIds = data.map(item => item.id);

      if (showRefreshMessage) {
        console.log("Заявките са обновени.");
      }

      filterRows();
    }

    async function approvePlace(id, rowElement) {
      const numericId = Number(id);
      const statusCell = rowElement.querySelector('.status');

      statusCell.textContent = 'Обработва се...';
      statusCell.className = 'status status-processing';

      try {
        const { data: placeData, error: fetchError } = await sb
          .from('pending_places')
          .select('*')
          .eq('id', numericId)
          .single();

        if (fetchError || !placeData) {
          console.error(fetchError);
          statusCell.textContent = 'Грешка при зареждане';
          statusCell.className = 'status status-error';
          return;
        }

        const newObject = {
          title: placeData.title || '',
          description: placeData.description || '',
          latitude: parseFloat(placeData.latitude),
          longitude: parseFloat(placeData.longitude),
          image_url: placeData.image_url || '',
          mountain: placeData.mountain || '',
          created_at: new Date().toISOString()
        };

        if (Number.isNaN(newObject.latitude) || Number.isNaN(newObject.longitude)) {
          statusCell.textContent = 'Невалидни координати';
          statusCell.className = 'status status-error';
          return;
        }

        const { error: insertError } = await sb
          .from('objects')
          .insert([newObject]);

        if (insertError) {
          console.error("Грешка при insert:", insertError);
          statusCell.textContent = 'Грешка при запис: ' + insertError.message;
          statusCell.className = 'status status-error';
          return;
        }

        const { error: deleteError } = await sb
          .from('pending_places')
          .delete()
          .eq('id', numericId);

        if (deleteError) {
          console.error("Грешка при delete:", deleteError);
          statusCell.textContent = 'Добавено, но не е премахнато';
          statusCell.className = 'status status-warn';
          return;
        }

        statusCell.textContent = '✅ Добавено успешно';
        statusCell.className = 'status status-success';

        setTimeout(() => {
          loadPendingRequests();
        }, 800);

      } catch (err) {
        console.error("Неочаквана грешка:", err);
        statusCell.textContent = 'Неочаквана грешка';
        statusCell.className = 'status status-error';
      }
    }

    async function rejectPlace(id, rowElement) {
      const numericId = Number(id);
      const statusCell = rowElement.querySelector(".status");

      statusCell.textContent = "Обработва се...";
      statusCell.className = 'status status-processing';

      const { error } = await sb
        .from("pending_places")
        .delete()
        .eq("id", numericId);

      if (error) {
        console.error(error);
        statusCell.textContent = "Грешка при отхвърляне";
        statusCell.className = 'status status-error';
      } else {
        statusCell.textContent = "Заявката е отхвърлена";
        statusCell.className = 'status status-warn';
        setTimeout(() => {
          loadPendingRequests();
        }, 800);
      }
    }

    async function editPlace(id) {
      const numericId = Number(id);

      const { data, error } = await sb
        .from("pending_places")
        .select("*")
        .eq("id", numericId)
        .single();

      if (error || !data) {
        console.error(error);
        alert("Грешка при зареждане");
        return;
      }

      document.getElementById("edit-id").value = data.id;
      document.getElementById("edit-title").value = data.title || "";
      document.getElementById("edit-description").value = data.description || "";
      document.getElementById("edit-lat").value = data.latitude ?? "";
      document.getElementById("edit-lng").value = data.longitude ?? "";
      document.getElementById("edit-mountain").value = data.mountain || "";
      document.getElementById("edit-img").value = data.image_url || "";

      openEditModal();
    }

    async function saveEdit() {
      const id = Number(document.getElementById("edit-id").value);

      const updated = {
        title: document.getElementById("edit-title").value.trim(),
        description: document.getElementById("edit-description").value.trim(),
        mountain: document.getElementById("edit-mountain").value.trim(),
        latitude: parseFloat(document.getElementById("edit-lat").value),
        longitude: parseFloat(document.getElementById("edit-lng").value),
        image_url: document.getElementById("edit-img").value.trim()
      };

      if (Number.isNaN(updated.latitude) || Number.isNaN(updated.longitude)) {
        alert("Моля въведи валидни координати.");
        return;
      }

      const { error } = await sb
        .from("pending_places")
        .update(updated)
        .eq("id", id);

      if (error) {
        console.error(error);
        alert("Грешка при записване: " + error.message);
      } else {
        closeEditModal();
        await loadPendingRequests(true);
      }
    }

    async function checkForNewRequests() {
      const { data, error } = await sb
        .from("pending_places")
        .select("id");

      if (error || !data) {
        console.error("Грешка при проверка за нови заявки:", error);
        return;
      }

      const newIds = data.map(p => p.id);
      const newOnes = newIds.filter(id => !lastIds.includes(id));

      if (newOnes.length > 0 && lastIds.length > 0) {
        const sound = document.getElementById("notificationSound");
        if (sound) {
          sound.play().catch(() => {});
        }
        await loadPendingRequests();
      } else {
        lastIds = newIds;
      }
    }

    document.getElementById('editModal').addEventListener('click', function (e) {
      if (e.target === this) {
        closeEditModal();
      }
    });

    loadPendingRequests();
    setInterval(checkForNewRequests, 15000);
  </script>

</body>
</html>
